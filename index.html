<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wild Rift Meta PRO+</title>
<style>
:root{--bg:#0b0f1a;--panel:#111827;--card:#1f2937;--accent:#3b82f6}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Arial;background:var(--bg);color:#fff}
header{background:linear-gradient(90deg,#0b0f1a,#111827);padding:20px;text-align:center;border-bottom:1px solid #1f2937}
header h1{margin:0;letter-spacing:.5px}
#controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:10px}
input,select{padding:10px 12px;border-radius:10px;border:1px solid #1f2937;background:#0b1220;color:#fff;outline:none}
#champions{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;padding:20px}
.card{background:var(--card);border-radius:14px;overflow:hidden;cursor:pointer;transition:.2s;border:1px solid #0b1220}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 25px rgba(0,0,0,.4)}
.card img{width:100%;height:120px;object-fit:cover}
.card .info{padding:12px}
.badge{display:inline-block;padding:4px 8px;border-radius:8px;font-size:12px;margin-top:6px}
.S{background:gold;color:#000}.A{background:#16a34a}.B{background:#f59e0b}.C{background:#ef4444}
#detail{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.6)}
.modal{width:min(900px,92vw);max-height:90vh;overflow:auto;background:var(--panel);border-radius:16px;border:1px solid #1f2937}
.modal header{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid #1f2937}
.modal header img{width:56px;height:56px;border-radius:12px}
.modal .content{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px}
.section{background:#0b1220;border-radius:12px;padding:12px;border:1px solid #0f172a}
.section h3{margin:6px 0 10px 0}
ul{margin:0;padding-left:18px}
.close{margin-left:auto;background:#0b1220;border:1px solid #1f2937;border-radius:10px;padding:8px 10px;cursor:pointer}
@media (max-width:800px){.modal .content{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>🔥 Wild Rift Meta PRO+</h1>
</header>

<div id="controls">
  <input id="search" placeholder="Buscar campeón..." />
  <select id="roleFilter">
    <option value="">Todos</option>
    <option>Top</option>
    <option>Mid</option>
    <option>Jungle</option>
    <option>ADC</option>
    <option>Support</option>
  </select>
</div>

<div id="champions"></div>

<div id="detail">
  <div class="modal">
    <header>
      <img id="d_icon" />
      <div>
        <h2 id="d_name" style="margin:0"></h2>
        <div id="d_role"></div>
        <div id="d_tier"></div>
      </div>
      <button class="close" onclick="closeDetail()">Cerrar</button>
    </header>
    <div class="content">
      <div class="section">
        <h3>Habilidades</h3>
        <ul id="d_abilities"></ul>
      </div>
      <div class="section">
        <h3>Build Meta</h3>
        <ul id="d_build"></ul>
        <h3>Runas</h3>
        <ul id="d_runes"></ul>
        <h3>Counters</h3>
        <ul id="d_counters"></ul>
      </div>
    </div>
  </div>
</div>

<script>
// ================== DATA (separado y escalable) ==================
// Puedes mover esto a champions.json más adelante sin cambiar la UI
let champions = [];

fetch('champions.json')
  .then(res => res.json())
  .then(data => {
    champions = data;
    render(champions);
  });
// ================== UI ==================
const container = document.getElementById('champions');

function card(c){
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `
    <img src="${c.icon}" alt="${c.name}"/>
    <div class="info">
      <h3 style="margin:0">${c.name}</h3>
      <div>${c.role}</div>
      <span class="badge ${c.tier}">Tier ${c.tier}</span>
    </div>`;
  el.onclick = ()=> show(c);
  return el;
}

function render(list){
  container.innerHTML = '';
  list.forEach(c=> container.appendChild(card(c)));
}

function show(c){
  document.getElementById('d_icon').src = c.icon;
  document.getElementById('d_name').innerText = c.name;
  document.getElementById('d_role').innerText = 'Rol: ' + c.role;
  document.getElementById('d_tier').innerHTML = `<span class="badge ${c.tier}">Tier ${c.tier}</span>`;
  fill('d_abilities', c.abilities);
  fill('d_build', c.build);
  fill('d_runes', c.runes);
  fill('d_counters', c.counters);
  document.getElementById('detail').style.display = 'flex';
}

function fill(id, arr){
  const el = document.getElementById(id);
  el.innerHTML = '';
  arr.forEach(t=>{
    const li = document.createElement('li');
    li.textContent = t;
    el.appendChild(li);
  });
}

function closeDetail(){ document.getElementById('detail').style.display='none'; }

// filtros
const search = document.getElementById('search');
const role = document.getElementById('roleFilter');

function apply(){
  const t = search.value.toLowerCase();
  const r = role.value;
  let list = champions.filter(c=> c.name.toLowerCase().includes(t));
  if(r) list = list.filter(c=> c.role === r);
  render(list);
}

search.oninput = apply; role.onchange = apply;

render(champions);
</script>
</body>
</html>
